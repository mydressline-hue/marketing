# ===========================================================================
# AI International Growth Engine - CI/CD Pipeline
#
# Stages:
#   1. lint        - TypeScript compilation check + ESLint
#   2. test:unit   - Unit tests
#   3. test:int    - Integration tests (requires services)
#   4. test:e2e    - End-to-end tests (requires full stack)
#   5. build       - Production TypeScript build
#   6. deploy      - Deploy to target environment
# ===========================================================================

name: AI Growth Engine CI/CD

on:
  push:
    branches: [main, staging, develop]
    paths:
      - 'server/**'
  pull_request:
    branches: [main, staging]
    paths:
      - 'server/**'

env:
  NODE_VERSION: '18'
  WORKING_DIR: ./server

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── 2. Unit Tests ───────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-ci
          ENCRYPTION_KEY: test-encryption-key-ci-32ch!

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: server/coverage/
          retention-days: 14

  # ── 3. Integration Tests ────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_growth_engine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/ai_growth_engine_test
          NODE_ENV: test

      - name: Run integration tests
        run: npm run test:integration -- --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/ai_growth_engine_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-ci
          ENCRYPTION_KEY: test-encryption-key-ci-32ch!

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-coverage
          path: server/coverage/
          retention-days: 14

  # ── 4. E2E Tests ────────────────────────────────────────────────────────
  test-e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_growth_engine_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/ai_growth_engine_e2e
          NODE_ENV: test

      - name: Seed test data
        run: npm run seed
        env:
          DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/ai_growth_engine_e2e
          NODE_ENV: test

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres_ci_password@localhost:5432/ai_growth_engine_e2e
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-ci
          ENCRYPTION_KEY: test-encryption-key-ci-32ch!
          PORT: 3001

  # ── 5. Build ────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 7

  # ── 6. Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, test-e2e]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: server/dist/

      - name: Configure environment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          fi

      - name: Run database migrations
        run: echo "Running migrations against ${{ env.DEPLOY_ENV }} database..."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: ${{ env.DEPLOY_ENV }}

      - name: Deploy to ${{ env.DEPLOY_ENV }}
        run: |
          echo "Deploying to ${{ env.DEPLOY_ENV }} environment..."
          echo "  Node.js version: ${{ env.NODE_VERSION }}"
          echo "  Build artifact: server/dist/"
          echo "  Target: ${{ env.DEPLOY_ENV }}"
          # Placeholder: Replace with actual deployment commands
          # Examples:
          #   - AWS ECS: aws ecs update-service ...
          #   - Docker: docker build && docker push ...
          #   - PM2: pm2 deploy ecosystem.config.js $DEPLOY_ENV
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NODE_ENV: ${{ env.DEPLOY_ENV }}

      - name: Verify deployment health
        run: |
          echo "Verifying health check endpoint..."
          # Placeholder: Replace DEPLOY_URL with actual deployed URL
          # curl -f https://$DEPLOY_URL/health || exit 1
          echo "Health check placeholder - configure DEPLOY_URL"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment to ${{ env.DEPLOY_ENV }}: ${{ job.status }}"
          # Placeholder: Add Slack/Discord/email notification here
