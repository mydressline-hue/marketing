  # -- Enhanced Filtering -------------------------------------------------
  /products/filter:
    get:
      tags: [Product Features]
      summary: Filter products
      description: Advanced product filtering with multiple filter dimensions and pagination.
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: minPrice
          in: query
          schema:
            type: number
            minimum: 0
          description: Minimum price filter
        - name: maxPrice
          in: query
          schema:
            type: number
            minimum: 0
          description: Maximum price filter (must be >= minPrice)
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated list of tags
        - name: vendor
          in: query
          schema:
            type: string
          description: Filter by vendor
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status
        - name: inventoryMin
          in: query
          schema:
            type: integer
            minimum: 0
          description: Minimum inventory count
        - name: inventoryMax
          in: query
          schema:
            type: integer
            minimum: 0
          description: Maximum inventory count (must be >= inventoryMin)
        - name: createdAfter
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}'
          description: Filter products created after this date
        - name: createdBefore
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}'
          description: Filter products created before this date (must be after createdAfter)
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Filtered products with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /products/filters/aggregations:
    get:
      tags: [Product Features]
      summary: Get filter aggregations
      description: Get filter facet counts (e.g. how many products per category/vendor/tag).
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: vendor
          in: query
          schema:
            type: string
          description: Filter by vendor
