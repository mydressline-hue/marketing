openapi: 3.0.3
info:
  title: Marketing Platform API
  description: |
    RESTful API for the marketing platform. Provides endpoints for authentication,
    campaign management, country targeting, dashboard analytics, product features,
    multi-factor authentication, feature flags, workflow orchestration, contextual
    bandits (learning), settings, and Prometheus metrics.

    All API routes (except health, metrics, and public auth endpoints) are prefixed
    with `/api/v1` and require a Bearer JWT token.

    Standard response envelope: `{ success: boolean, data: T, meta?: { ... } }`
  version: 1.0.0
  contact:
    name: Marketing Platform Team

servers:
  - url: /api/v1
    description: Default API prefix

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -----------------------------------------------------------------------
  # Reusable schemas
  # -----------------------------------------------------------------------
  schemas:
    # -- Shared envelope --------------------------------------------------
    SuccessFlag:
      type: boolean
      example: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    CursorMeta:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
        previousCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    # -- Auth schemas -----------------------------------------------------
    RegisterRequest:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, and one number
        name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthTokensResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SuccessFlag'
        data:
          type: object
          properties:
            user:
              type: object
            token:
              type: string
            refreshToken:
              type: string

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string

    RefreshTokenResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SuccessFlag'
        data:
          type: object
          properties:
            token:
              type: string
            refreshToken:
              type: string

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        avatar:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, and one number

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, and one number

    # -- Campaign schemas -------------------------------------------------
    CreateCampaignRequest:
      type: object
      required: [name, countryId, platform, type, budget, startDate, endDate]
      properties:
        name:
          type: string
          minLength: 1
        countryId:
          type: string
          format: uuid
        platform:
          type: string
          enum: [google, bing, meta, tiktok, snapchat]
        type:
          type: string
          minLength: 1
        budget:
          type: number
          minimum: 0
          exclusiveMinimum: true
        startDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}'
          description: ISO date string (YYYY-MM-DD). endDate must be after startDate.
        endDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}'
          description: ISO date string (YYYY-MM-DD). Must be after startDate.

    UpdateCampaignRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        countryId:
          type: string
          format: uuid
        platform:
          type: string
          enum: [google, bing, meta, tiktok, snapchat]
        type:
          type: string
          minLength: 1
        budget:
          type: number
          minimum: 0
          exclusiveMinimum: true
        startDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}'
        endDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}'
        status:
          type: string

    UpdateCampaignStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          minLength: 1

    # -- Country schemas --------------------------------------------------
    CreateCountryRequest:
      type: object
      required: [name, code, region, language, currency, timezone]
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 code (uppercased automatically)
        region:
          type: string
          minLength: 1
        language:
          type: string
          minLength: 1
        currency:
          type: string
          minLength: 1
        timezone:
          type: string
          minLength: 1

    UpdateCountryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
          minLength: 2
          maxLength: 2
        region:
          type: string
          minLength: 1
        language:
          type: string
          minLength: 1
        currency:
          type: string
          minLength: 1
        timezone:
          type: string
          minLength: 1

    # -- Settings schemas -------------------------------------------------
    UpdateSettingsRequest:
      type: object
      properties:
        notifications:
          type: object
          properties:
            email:
              type: boolean
            push:
              type: boolean
            sms:
              type: boolean
        appearance:
          type: object
          properties:
            theme:
              type: string
            language:
              type: string
            timezone:
              type: string
        apiKeys:
          type: object
          properties:
            google:
              type: string
            meta:
              type: string
            tiktok:
              type: string
            snapchat:
              type: string
            bing:
              type: string

    UpdateNotificationsSettingsRequest:
      type: object
      properties:
        email:
          type: boolean
        push:
          type: boolean
        sms:
          type: boolean

    UpdateAppearanceSettingsRequest:
      type: object
      properties:
        theme:
          type: string
        language:
          type: string
        timezone:
          type: string

    # -- Product Features schemas -----------------------------------------
    PickProductsRequest:
      type: object
      required: [collectionId, strategy, count]
      properties:
        collectionId:
          type: string
          format: uuid
        strategy:
          type: string
          minLength: 1
        count:
          type: integer
          minimum: 1
        filters:
          type: object
          additionalProperties: true

    CreateCollectionRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        rules:
          type: object
          additionalProperties: true

    UpdateCollectionRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        rules:
          type: object
          additionalProperties: true

    CollectionProductsRequest:
      type: object
      required: [productIds]
      properties:
        productIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1

    ReorderCollectionProductsRequest:
      type: object
      required: [productIds]
      properties:
        productIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1

    RecordProductViewRequest:
      type: object
      required: [productId, source, sessionId]
      properties:
        productId:
          type: string
          format: uuid
        source:
          type: string
          minLength: 1
        sessionId:
          type: string
          minLength: 1

    RecordProductSaleRequest:
      type: object
      required: [productId, quantity, revenue, orderId]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        revenue:
          type: number
          minimum: 0
        orderId:
          type: string
          minLength: 1

    # -- MFA schemas ------------------------------------------------------
    MfaVerifyRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    MfaValidateRequest:
      type: object
      properties:
        token:
          type: string
        recoveryCode:
          type: string

    MfaSetupResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SuccessFlag'
        data:
          type: object
          properties:
            otpauthUri:
              type: string
            recoveryCodes:
              type: array
              items:
                type: string

    # -- Feature Flag schemas ---------------------------------------------
    CreateFeatureFlagRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        is_enabled:
          type: boolean
        rollout_percentage:
          type: integer
          minimum: 0
          maximum: 100

    UpdateFeatureFlagRequest:
      type: object
      properties:
        description:
          type: string
        is_enabled:
          type: boolean
        rollout_percentage:
          type: integer
          minimum: 0
          maximum: 100

    FeatureFlagCheckResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SuccessFlag'
        data:
          type: object
          properties:
            name:
              type: string
            enabled:
              type: boolean

    # -- Workflow schemas -------------------------------------------------
    CreateWorkflowRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        steps:
          type: array
          items:
            type: object
            additionalProperties: true

    # -- Learning / Bandit schemas ----------------------------------------
    RecordObservationRequest:
      type: object
      required: [contextType, armName, reward]
      properties:
        contextType:
          type: string
        armName:
          type: string
        reward:
          type: number
        rewardType:
          type: string
        contextVector:
          type: object
          additionalProperties: true

    ObservationResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SuccessFlag'
        data:
          type: object
          properties:
            observation_id:
              type: string
            arm:
              type: object
              properties:
                id:
                  type: string
                context_type:
                  type: string
                arm_name:
                  type: string
                observation_count:
                  type: integer
                alpha:
                  type: number
                beta:
                  type: number
                mu:
                  type: number
                lambda:
                  type: number
                a:
                  type: number
                b:
                  type: number

    ArmsStatsResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SuccessFlag'
        data:
          type: object
          properties:
            context_type:
              type: string
            arms:
              type: array
              items:
                type: object
            total_arms:
              type: integer
            total_observations:
              type: integer

  # -----------------------------------------------------------------------
  # Reusable parameters
  # -----------------------------------------------------------------------
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-based)

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page

    SortByParam:
      name: sortBy
      in: query
      schema:
        type: string
      description: Column to sort by

    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
      description: Sort direction

    StartDateParam:
      name: startDate
      in: query
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}'
      description: ISO date string (YYYY-MM-DD)

    EndDateParam:
      name: endDate
      in: query
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}'
      description: ISO date string (YYYY-MM-DD). Must be after startDate.

# ---------------------------------------------------------------------------
# Default security -- most endpoints require a Bearer token
# ---------------------------------------------------------------------------
security:
  - BearerAuth: []

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------
tags:
  - name: Auth
    description: Authentication, registration, OAuth, password management
  - name: Campaigns
    description: Campaign CRUD, status transitions, metrics, and spend
  - name: Countries
    description: Country management and opportunity scoring
  - name: Dashboard
    description: Aggregated dashboard views and analytics
  - name: Settings
    description: System and user settings management
  - name: Product Features
    description: AI product picking, filtering, collections, analytics
  - name: MFA
    description: Multi-factor authentication setup and validation
  - name: Feature Flags
    description: Feature flag CRUD and enablement checks
  - name: Workflows
    description: Sequential workflow creation, execution, and cancellation
  - name: Learning
    description: Contextual bandits -- observation, recommendation, convergence
  - name: Metrics
    description: Prometheus metrics endpoint
  - name: Health
    description: Health check endpoint

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # =========================================================================
  # AUTH
  # =========================================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Create a new user account and return JWT tokens. The role is forced to 'user' on self-registration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticate a user with email and password and return JWT tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchange a refresh token for a new access/refresh token pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Invalidate the current session and access token.
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: Retrieve the authenticated user's profile information.
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
                    description: User profile object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Auth]
      summary: Update current user profile
      description: Update profile fields such as name, email, and avatar for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
                    description: Updated user profile object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      description: Change the authenticated user's password by providing the current and new passwords.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      description: >-
        Request a password reset token for the given email. Always returns 200
        regardless of whether the email exists to prevent enumeration attacks.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      description: Reset a user's password using a valid reset token received via email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password has been reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google:
    get:
      tags: [Auth]
      summary: Initiate Google OAuth
      description: >-
        Redirect the user to the Google OAuth consent screen. Sets a CSRF state
        cookie for verification on callback.
      security: []
      responses:
        '302':
          description: Redirect to Google OAuth consent screen

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      description: >-
        Handle the Google OAuth callback. Verifies CSRF state, exchanges the
        authorization code for tokens, and returns JWT tokens.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from Google
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: CSRF state parameter
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          description: Invalid state or missing code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # CAMPAIGNS
  # =========================================================================
  /campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns
      description: List campaigns with optional filtering and offset-based pagination.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: countryId
          in: query
          schema:
            type: string
          description: Filter by country UUID
        - name: platform
          in: query
          schema:
            type: string
          description: Filter by platform
        - name: status
          in: query
          schema:
            type: string
          description: Filter by campaign status
        - name: createdBy
          in: query
          schema:
            type: string
          description: Filter by creator user ID
      responses:
        '200':
          description: Paginated list of campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Campaigns]
      summary: Create a campaign
      description: >-
        Create a new campaign. Requires write:campaigns permission. Subject to
        kill switch governance checks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCampaignRequest'
      responses:
        '201':
          description: Campaign created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden -- insufficient permissions or kill switch active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campaigns/cursor:
    get:
      tags: [Campaigns]
      summary: List campaigns with cursor pagination
      description: >-
        List campaigns using cursor-based pagination. Omit cursor for the first
        page; use nextCursor from the response for subsequent pages.
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor from a previous response (omit for first page)
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: countryId
          in: query
          schema:
            type: string
          description: Filter by country UUID
        - name: platform
          in: query
          schema:
            type: string
          description: Filter by platform
        - name: status
          in: query
          schema:
            type: string
          description: Filter by campaign status
        - name: createdBy
          in: query
          schema:
            type: string
          description: Filter by creator user ID
      responses:
        '200':
          description: Cursor-paginated list of campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    $ref: '#/components/schemas/CursorMeta'

  /campaigns/spend/summary:
    get:
      tags: [Campaigns]
      summary: Get spend summary
      description: Retrieve total spend summary broken down by platform and country.
      parameters:
        - $ref: '#/components/parameters/StartDateParam'
        - $ref: '#/components/parameters/EndDateParam'
      responses:
        '200':
          description: Spend summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
