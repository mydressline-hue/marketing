  # =========================================================================
  # MFA
  # =========================================================================
  /mfa/setup:
    post:
      tags: [MFA]
      summary: Set up MFA
      description: >-
        Initiate MFA setup for the authenticated user. Returns the otpauth URI
        (for QR code rendering) and a set of single-use recovery codes.
      responses:
        '201':
          description: MFA setup initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'

  /mfa/verify:
    post:
      tags: [MFA]
      summary: Verify MFA setup
      description: >-
        Verify the initial TOTP token to confirm authenticator app configuration.
        This enables MFA on the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA verified and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /mfa/validate:
    post:
      tags: [MFA]
      summary: Validate MFA token
      description: >-
        Validate a TOTP token or recovery code during the login flow. Accepts
        either { token } for TOTP or { recoveryCode } for backup codes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaValidateRequest'
      responses:
        '200':
          description: MFA validation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid token or recovery code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /mfa:
    delete:
      tags: [MFA]
      summary: Disable MFA
      description: Disable MFA for the authenticated user.
      responses:
        '204':
          description: MFA disabled (no content)

  # =========================================================================
  # FEATURE FLAGS
  # =========================================================================
  /feature-flags:
    get:
      tags: [Feature Flags]
      summary: List all feature flags
      description: Retrieve all feature flags. Available to any authenticated user.
      responses:
        '200':
          description: List of feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: array
                    items:
                      type: object
    post:
      tags: [Feature Flags]
      summary: Create a feature flag
      description: Create a new feature flag. Admin role required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeatureFlagRequest'
      responses:
        '201':
          description: Feature flag created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden -- admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /feature-flags/{name}:
    get:
      tags: [Feature Flags]
      summary: Get a feature flag
      description: Retrieve a single feature flag by name. Available to any authenticated user.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Feature flag name
      responses:
        '200':
          description: Feature flag details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '404':
          description: Feature flag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Feature Flags]
      summary: Update a feature flag
      description: Update an existing feature flag. Admin role required.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Feature flag name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureFlagRequest'
      responses:
        '200':
          description: Feature flag updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '403':
          description: Forbidden -- admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Feature Flags]
      summary: Delete a feature flag
      description: Delete a feature flag. Admin role required.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Feature flag name
      responses:
        '200':
          description: Feature flag deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Forbidden -- admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /feature-flags/{name}/check:
    get:
      tags: [Feature Flags]
      summary: Check feature flag enablement
      description: Check whether a feature flag is enabled for the current user.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Feature flag name
      responses:
        '200':
          description: Flag enablement status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagCheckResponse'

  # =========================================================================
  # WORKFLOWS
  # =========================================================================
  /workflows:
    post:
      tags: [Workflows]
      summary: Create a workflow
      description: >-
        Create a new workflow with steps and dependency declarations. Requires
        write:infrastructure permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workflows/{id}:
    get:
      tags: [Workflows]
      summary: Get workflow status
      description: >-
        Retrieve full workflow status including all steps. Requires
        read:infrastructure permission.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Workflow status with steps
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Workflows]
      summary: Cancel a workflow
      description: >-
        Cancel a running or pending workflow. Requires write:infrastructure
        permission.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Workflow cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workflows/{id}/execute:
    post:
      tags: [Workflows]
      summary: Execute a workflow
      description: >-
        Start executing a pending workflow. Requires write:infrastructure
        permission.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Workflow execution started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # LEARNING (Contextual Bandits)
  # =========================================================================
  /learning/observe:
    post:
      tags: [Learning]
      summary: Record bandit observation
      description: >-
        Record a bandit observation and update the posterior. Requires
        write:agents permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordObservationRequest'
      responses:
        '201':
          description: Observation recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationResponse'

  /learning/recommend/{contextType}:
    get:
      tags: [Learning]
      summary: Get arm recommendation
      description: >-
        Use Thompson Sampling to recommend the best arm for a given context type.
        Requires read:agents permission.
      parameters:
        - name: contextType
          in: path
          required: true
          schema:
            type: string
          description: Context type for the bandit
        - name: context
          in: query
          schema:
            type: string
          description: JSON-encoded context vector
        - name: exclude
          in: query
          schema:
            type: string
          description: Comma-separated list of arm names to exclude
      responses:
        '200':
          description: Recommended arm
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object

  /learning/arms/{contextType}:
    get:
      tags: [Learning]
      summary: Get arms statistics
      description: >-
        Return all arms with statistics and confidence intervals for a given
        context type. Requires read:agents permission.
      parameters:
        - name: contextType
          in: path
          required: true
          schema:
            type: string
          description: Context type for the bandit
      responses:
        '200':
          description: Arms statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArmsStatsResponse'

  /learning/convergence/{contextType}:
    get:
      tags: [Learning]
      summary: Check convergence
      description: >-
        Check whether the bandit has converged for a given context type.
        Requires read:agents permission.
      parameters:
        - name: contextType
          in: path
          required: true
          schema:
            type: string
          description: Context type for the bandit
        - name: threshold
          in: query
          schema:
            type: number
          description: Custom convergence threshold
      responses:
        '200':
          description: Convergence status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object

  /learning/decay:
    post:
      tags: [Learning]
      summary: Trigger observation decay
      description: >-
        Trigger observation time decay, usually called by a cron job. Requires
        write:agents permission.
      responses:
        '200':
          description: Decay applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/SuccessFlag'
                  data:
                    type: object

  # =========================================================================
  # METRICS (mounted at /metrics, not under /api/v1)
  # =========================================================================

  # NOTE: The /metrics endpoint is mounted at the root level, not under /api/v1.
  # It is documented here for completeness.
  # Actual path: GET /metrics
  /metrics:
    get:
      tags: [Metrics]
      summary: Get Prometheus metrics
      description: >-
        Returns all application metrics in the Prometheus text exposition format.
        This endpoint is intentionally unauthenticated so that Prometheus
        scrapers can reach it. In production, access should be restricted at the
        network/ingress level. Returns 503 if metrics collection is disabled.
        Note: This endpoint is mounted at /metrics (root level), not under /api/v1.
      security: []
      responses:
        '200':
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string
                description: Prometheus text exposition format (text/plain; version=0.0.4)
        '503':
          description: Metrics collection is disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Metrics collection is disabled

  # =========================================================================
  # HEALTH (mounted at /health, not under /api/v1)
  # =========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: >-
        Simple health check endpoint returning server status and timestamp.
        Note: This endpoint is mounted at /health (root level), not under /api/v1.
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
