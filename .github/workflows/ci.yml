name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Lint & Type-check (both server and UI)
  # ===========================================================================
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            ui/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Lint server
        run: cd server && npm run lint

      - name: Lint UI
        run: cd ui && npm run lint

      - name: Typecheck server
        run: cd server && npx tsc --noEmit

      - name: Typecheck UI
        run: cd ui && npx tsc -b --noEmit

  # ===========================================================================
  # Server tests (requires Postgres + Redis services)
  # ===========================================================================
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_growth_engine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_growth_engine_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-must-be-at-least-32-chars
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run tests with coverage
        run: cd server && npm test -- --coverage --forceExit

      - name: Upload server coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage
          retention-days: 14

  # ===========================================================================
  # UI tests
  # ===========================================================================
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Run tests with coverage
        run: cd ui && npm run test:coverage

      - name: Upload UI coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: ui/coverage
          retention-days: 14

  # ===========================================================================
  # Build verification
  # ===========================================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [server-tests, ui-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            ui/package-lock.json

      - name: Build server
        run: cd server && npm ci && npm run build

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Verify server build output
        run: test -f server/dist/index.js

      - name: Verify UI build output
        run: |
          test -f ui/dist/index.html
          ls -la ui/dist/assets/*.js
