###############################################################################
# AI International Growth Engine - Development Dependencies
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Provides only the infrastructure services (postgres + redis) so developers
# can run the server and UI locally with hot-reload.
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 (dev)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_growth_engine_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_growth_engine_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7 (dev)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev:
